<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="static/css/estilos.css">
        <title>Login</title>
    </head>
    <body class="bg-light">
        <div class="container mt-5">
            <h1 class="titulo text-center mb-4">Login</h1>
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert alert-info text-center">
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}
            <form action="{{ url_for('login') }}" method="post" class="col-md-6 mx-auto">
                <div class="card p-4 shadow-sm">
                    <div class="mb-3">
                        <label class="form-label nome">Usuário:</label>
                        <input type="text" name="name" class="form-control" placeholder="User" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label nome">Senha:</label>
                        <input type="password" name="password" class="form-control" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn btn-lightgreen-outline py-3">Entrar</button>
                </div>
            </form>
            <div class="text-center mt-4">
                <a href="/projeto" class="btn btn-primary-blue">Mais informações sobre o projeto</a>
            </div>
        </div>
    </body>
</html>
