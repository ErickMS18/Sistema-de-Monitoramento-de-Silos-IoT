{% extends "base_home.html" %}

{% block title %}Dispositivos{% endblock %}

{% block content %}
<div class="container py-4">
    {% if user_role == 1 %}
        <a href="/home" class="btn btn-lightgreen-outline mb-3">Voltar para a página inicial</a>
        
        <h2 class="titulo mb-4">Editar dispositivo: <span class="nome">{{ device.name }}</span></h2>
        
        <div class="card shadow-sm">
            <div class="card-header bg-powderblue">
                <h3 class="h5 mb-0">Configurações do dispositivo</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nome do dispositivo
                        </label>
                        <input type="text" class="form-control" name="name" value="{{ device.name }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Tipo do dispositivo</label>
                        <select class="form-select" name="device_type">
                            <option value="sensor" {% if device.device_type == 'sensor' %}selected{% endif %}>Sensor</option>
                            <option value="actuator" {% if device.device_type == 'actuator' %}selected{% endif %}>Atuador</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Unidade de medida</label>
                        <input type="text" class="form-control" name="unit" value="{{ device.unit }}">
                    </div>
                    
                    <div class="mb-3 form-check form-switch">
                        <input class="form-check-input" type="checkbox" name="is_active" id="is_active" {% if device.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">Ativo</label>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">Kit pertencente</label>
                        <select class="form-select" name="kit_id">
                            {% for kit in kits %}
                                <option value="{{ kit.id }}" {% if kit.id == device.kit_id %}selected{% endif %}>{{ kit.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <button type="submit" class="btn btn-success-green">Atualizar dispositivo</button>
                </form>
            </div>
        </div>
    {% else %}
        <div class="alert alert-danger">Acesso negado.</div>
        <a href="/home" class="btn btn-lightgreen-outline">Voltar para a página inicial</a>
    {% endif %}
</div>
{% endblock %}
